steps:
  # 1. Build container image con build-arg APP_ENV
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--build-arg", "APP_ENV=${_APP_ENV}",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA",
        "."
      ]

  # 2. Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      ]

  # 3. Deploy to Cloud Run (AQUÍ ESTÁ LA SOLUCIÓN)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run", "deploy", "${_SERVICE}",
        "--image", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA",
        "--region", "${_REGION}",
        "--platform", "managed",
        "--allow-unauthenticated",

        # --- CONFIGURACIÓN CRÍTICA PARA PLAYWRIGHT ---
        "--memory", "2Gi",      # Aumentado de 512MB a 2GB (necesario para Chrome)
        "--cpu", "1",           # Asegura 1 CPU completo
        "--timeout", "5m",      # Tiempo extra para arranque
        # ---------------------------------------------

        # Secret Manager: MS_MOV_PT_SECS_JSON
        "--set-secrets", "MS_MOV_PT_SECS_JSON=ms-mov-pt-secs:latest"
      ]

substitutions:
  _REGION: "us-central1"
  _REPO: "api-totales"
  _SERVICE: "ms-mv-consulta-vehiculo-pt"
  _APP_ENV: "prod"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"