# Stage y main: usan Secret Manager (ms-mov-pt-secs). Igual que workflow-pt.
substitutions:
  _REGION: "us-central1"
  _REPO: "api-totales"
  _SERVICE: "ms-mv-consulta-vehiculo-pt"
  _SHARED_VPC_HOST_PROJECT: "sb-ecosistemaanalitico-redes"
  _SHARED_VPC_NETWORK_NAME: "sb-ea-net-prd"
  _SHARED_VPC_SUBNET_NAME: "sb-ea-subnet-prd"

steps:
  # 1. Build container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA",
        "."
      ]

  # 2. Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      ]

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run", "deploy", "${_SERVICE}",
        "--image", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA",
        "--region", "${_REGION}",
        "--platform", "managed",
        "--allow-unauthenticated",
        "--memory", "2Gi",
        "--cpu", "1",
        "--timeout", "5m",
        "--network=projects/${_SHARED_VPC_HOST_PROJECT}/global/networks/${_SHARED_VPC_NETWORK_NAME}",
        "--subnet=projects/${_SHARED_VPC_HOST_PROJECT}/regions/${_REGION}/subnetworks/${_SHARED_VPC_SUBNET_NAME}",
        "--vpc-egress=private-ranges-only",
        "--service-account=sa-pt-indemnizaciones@$PROJECT_ID.iam.gserviceaccount.com",
        "--set-secrets=MS_MOV_PT_SECS_JSON=ms-mov-pt-secs:latest"
      ]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"